<button id="btn-cortina" class="btn-lux">
  🌙 Ativar Cortina da Paz
</button>

<script>
(function(){
  const STORAGE_KEY = "di_cortina_paz_v1";
  const BG_LAYER_ID = "bg-layer-fixed";

  const FX_BG = "https://kodux78k.github.io/oiDual-Vivivi-1/media/portifolio/img5.jpg"; // pode trocar

  function applyCortina(state){
    const bg = document.getElementById(BG_LAYER_ID);
    if(!bg) return;

    if(state){
      bg.style.backgroundImage = `url('${FX_BG}')`;
      bg.style.opacity = "0.18";
      bg.style.mixBlendMode = "overlay";

      // opcional: animação leve
      bg.style.transition = "opacity .8s ease";
      bg.style.filter = "blur(2px) saturate(110%)";
    } else {
      bg.style.backgroundImage = "none";
      bg.style.opacity = "0";
    }
  }

  function save(state){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function load(){
    try{
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || false;
    }catch(e){
      return false;
    }
  }

  window.addEventListener("load", ()=>{
    const btn = document.getElementById("btn-cortina");
    let state = load();

    applyCortina(state);
    updateLabel(btn, state);

    if(btn){
      btn.addEventListener("click", ()=>{
        state = !state;
        applyCortina(state);
        save(state);
        updateLabel(btn, state);
      });
    }
  });

  function updateLabel(btn, state){
    if(!btn) return;
    btn.innerText = state 
      ? "✨ Cortina da Paz Ativa" 
      : "🌙 Ativar Cortina da Paz";
  }

})();
</script>
