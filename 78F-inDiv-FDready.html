<style>

 .bg-gradient-base {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, rgba(255,255,255,.55), transparent 45%);
      pointer-events: none;
      z-index: var(--z-base);
    }

    #bg-layer-fixed {
      position: fixed;
      inset: 0;
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      opacity: .15;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: var(--z-base);
    }

    #drawerOverlay {
      position: fixed;
      inset: 0;
      background: rgba(15,17,21,.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease;
      z-index: var(--z-overlay);
    }

    #drawerOverlay.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(420px, 92vw);
      height: 100vh;
      background: rgba(9, 11, 16, .96);
      color: #fff;
      border-left: 1px solid rgba(255,255,255,.08);
      transform: translateX(102%);
      transition: transform .26s ease;
      z-index: var(--z-system);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(16px);
    }

    .drawer.is-open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 18px 14px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }

    .drawer-header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .drawer-close {
      width: 38px;
      height: 38px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.04);
      color: #fff;
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    .drawer-body {
      overflow: auto;
      padding: 16px;
    }

    .panel-section {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .14em;
      color: rgba(255,255,255,.78);
      margin-bottom: 10px;
    }

    .tiny-note {
      color: rgba(255,255,255,.58);
      font-size: 12px;
      line-height: 1.5;
    }

    .panel-section input[type="range"],
    .panel-section select,
    .btn-mini,
    .btn-download,
    .btn-action,
    .btn-upload,
    .preset-btn {
      width: 100%;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.05);
      color: #fff;
      padding: 11px 12px;
      outline: none;
    }

    .panel-section select {
      appearance: none;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .preset-btn {
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      padding: 12px 10px;
    }

    .preset-btn.active {
      background: rgba(240,199,117,.18);
      border-color: rgba(240,199,117,.35);
      color: #f0c775;
    }

    .btn-upload,
    .btn-mini,
    .btn-download,
    .btn-action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .04em;
      min-height: 42px;
    }

    .fx-stage {
      display: grid;
      gap: 12px;
    }

    .fx-actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .fx-canvas-wrap {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
    }

    #fxCanvas {
      width: 100%;
      height: auto;
      display: block;
      background: #0f1115;
    }

    .bg-thumbs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .bg-thumb {
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      background-size: cover;
      background-position: center;
      border: 1px solid rgba(255,255,255,.08);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .bg-thumb::after {
      content: attr(data-label);
      position: absolute;
      left: 8px;
      bottom: 8px;
      right: 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: rgba(255,255,255,.92);
      text-shadow: 0 1px 4px rgba(0,0,0,.55);
    }

    .wrap {
      position: relative;
      z-index: var(--z-content);
    }

    .nav-count {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
      color: rgba(255,255,255,.72);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      padding: 10px 12px;
      border-radius: 999px;
    }

    .drawer-toggle {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      cursor: pointer;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      color: #fff;
      font-size: 18px;
    }

    .nav-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .catalog-nav {
      position: sticky;
      bottom: 16px;
      z-index: 40;
      width: min(var(--container), calc(100% - 32px));
      margin: 18px auto 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
    }

    .nav-btn {
      pointer-events: auto;
      padding: 12px 16px;
      border-radius: 999px;
      border: 1px solid rgba(23,32,51,.08);
      background: rgba(255,255,255,.88);
      box-shadow: 0 10px 24px rgba(17, 24, 39, .08);
      cursor: pointer;
      font-weight: 700;
      color: var(--text);
    }

    .footer-quote {
      width: min(var(--container), calc(100% - 32px));
      margin: 16px auto 0;
      padding: 16px 18px;
      border-radius: 18px;
      background: rgba(255,255,255,.72);
      border: 1px solid rgba(23,32,51,.08);
      color: var(--muted);
      text-align: center;
      font-size: 14px;
    }
  </style>



<div class="bg-gradient-base"></div>
  <div id="bg-layer-fixed"></div>

  <div id="drawerOverlay" onclick="toggleDrawer()"></div>

  <aside class="drawer" id="drawerPanel" aria-label="Background Engine">
    <div class="drawer-header">
      <h2>⚙️ Background Engine</h2>
      <button class="drawer-close" onclick="toggleDrawer()" title="Fechar">×</button>
    </div>

    <div class="drawer-body">
      <div class="panel-section">
        <label class="section-label"><span>Background</span><span id="bgStatusText">Nenhum</span></label>
        <div class="tiny-note">Ajuste a camada fixa do app e sincronize com localStorage.</div>
      </div>

      <div class="panel-section">
        <label class="section-label"><span>Opacidade</span><span id="val-op">15%</span></label>
        <input id="bgOpacity" type="range" min="0" max="100" value="15" oninput="updateBgAttr('opacity', this.value)">
      </div>

      <div class="panel-section">
        <label class="section-label"><span>Mix Blend Mode</span><span>CSS</span></label>
        <select id="bgBlend" onchange="updateBgAttr('blend', this.value)">
          <option value="normal">Normal</option>
          <option value="multiply">Multiply (Escurecer)</option>
          <option value="screen">Screen (Clarear)</option>
          <option value="overlay" selected>Overlay (Realçar)</option>
          <option value="soft-light">Soft Light (Suave)</option>
          <option value="luminosity">Luminosity (Fantasma)</option>
        </select>
      </div>

      <div class="panel-section">
        <label class="section-label"><span>Presets de Estilo</span><span>BG</span></label>
        <div class="preset-grid">
          <button class="preset-btn" data-bg-preset="ghost" onclick="applyPreset('ghost')">Fantasma</button>
          <button class="preset-btn active" data-bg-preset="vivid" onclick="applyPreset('vivid')">Vívido</button>
          <button class="preset-btn" data-bg-preset="deep" onclick="applyPreset('deep')">Profundo</button>
        </div>
      </div>

      <div class="panel-section">
        <label class="section-label"><span>Biblioteca Local</span><span id="libCount">0</span></label>
        <div class="bg-thumbs" id="thumb-list"></div>
        <label class="btn-upload">
          + Fazer Upload de Imagem
          <input type="file" id="file-upload" accept="image/*" hidden onchange="handleUpload(this)">
        </label>
      </div>

      <div class="panel-section">
        <label class="section-label"><span>FX Lab</span><span>Upload / Frame</span></label>
        <div class="fx-stage">
          <div class="fx-actions">
            <button class="btn-mini" onclick="loadCurrentFrameToFX()">Carregar quadro atual</button>
            <label class="btn-mini" style="justify-content:center;">
              Upload imagem
              <input type="file" id="fx-upload" accept="image/*" hidden>
            </label>
            <button class="btn-download" onclick="downloadFX()">Download PNG</button>
          </div>

          <div class="fx-canvas-wrap">
            <canvas id="fxCanvas" width="1200" height="800"></canvas>
          </div>

          <div class="preset-grid">
            <button class="preset-btn active" data-fx-mode="texture" onclick="setFXMode('texture')">Textura</button>
            <button class="preset-btn" data-fx-mode="liquid" onclick="setFXMode('liquid')">Líquido</button>
            <button class="preset-btn" data-fx-mode="paint" onclick="setFXMode('paint')">Tinta</button>
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Blur gaussiano</span><span id="fxBlurVal">4</span></label>
            <input id="fxBlur" type="range" min="0" max="24" value="4">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Intensidade</span><span id="fxIntensityVal">55</span></label>
            <input id="fxIntensity" type="range" min="0" max="100" value="55">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Liquify</span><span id="fxLiquifyVal">0</span></label>
            <input id="fxLiquify" type="range" min="0" max="100" value="0">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Grain / textura</span><span id="fxGrainVal">35</span></label>
            <input id="fxGrain" type="range" min="0" max="100" value="35">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Contraste</span><span id="fxContrastVal">108</span></label>
            <input id="fxContrast" type="range" min="80" max="140" value="108">
          </div>

          <div class="panel-section" style="padding:14px;">
            <label class="section-label"><span>Saturação</span><span id="fxSaturationVal">102</span></label>
            <input id="fxSaturation" type="range" min="60" max="150" value="102">
          </div>

          <button class="btn-action" onclick="applyFXToBackground()">Aplicar FX no Background</button>
          <div class="tiny-note">Se a imagem for muito grande, o motor reduz a área para manter o render leve.</div>
        </div>
      </div>
    </div>
  </aside>

<div class="wrap">
    <header class="topbar">
     

        <div class="nav-group">
          <div class="nav-count" id="ui-catalog-counter">CARREGANDO...</div>
          <div class="drawer-toggle" onclick="toggleDrawer()" title="Abrir Engine de Background">🎛️</div>
        </div>
      </div>

 <script src="https://kodux78k.github.io/oiDual--Y-/M0D/78F/js/modules/inline-0.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/78F/js/modules/inline-0-ovr.js"></script>
  <script src="https://kodux78k.github.io/oiDual--Y-/M0D/78F/js/inline-bg.js"></script>

  <script>
    (function () {
      const bgLayer = document.getElementById('bg-layer-fixed');
      const drawer = document.getElementById('drawerPanel');
      const overlay = document.getElementById('drawerOverlay');

      const bgImg = "https://kodux78k.github.io/oiDual--Y-/M0D/78FFD/media/portifolio/img5.jpeg";
      const fallbackImg = "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=2070&auto=format&fit=crop";

      if (bgLayer) {
        bgLayer.style.backgroundImage = `url('${bgImg}')`;
      }

      const probe = new Image();
      probe.src = bgImg;
      probe.onerror = function () {
        if (bgLayer) bgLayer.style.backgroundImage = `url('${fallbackImg}')`;
      };

      window.toggleDrawer = window.toggleDrawer || function () {
        const isOpen = drawer.classList.toggle('is-open');
        overlay.classList.toggle('is-open', isOpen);
      };

      window.updateBgAttr = window.updateBgAttr || function (type, value) {
        if (!bgLayer) return;
        if (type === 'opacity') {
          const n = Number(value) / 100;
          bgLayer.style.opacity = String(n);
          const op = document.getElementById('val-op');
          if (op) op.textContent = `${value}%`;
        }
        if (type === 'blend') {
          bgLayer.style.mixBlendMode = value;
        }
      };

      window.applyPreset = window.applyPreset || function (preset) {
        if (!bgLayer) return;
        const op = document.getElementById('bgOpacity');
        const blend = document.getElementById('bgBlend');
        const status = document.getElementById('bgStatusText');

        if (preset === 'ghost') {
          bgLayer.style.opacity = '0.08';
          bgLayer.style.mixBlendMode = 'luminosity';
          if (op) op.value = 8;
          if (blend) blend.value = 'luminosity';
          if (status) status.textContent = 'Fantasma';
        } else if (preset === 'deep') {
          bgLayer.style.opacity = '0.22';
          bgLayer.style.mixBlendMode = 'multiply';
          if (op) op.value = 22;
          if (blend) blend.value = 'multiply';
          if (status) status.textContent = 'Profundo';
        } else {
          bgLayer.style.opacity = '0.15';
          bgLayer.style.mixBlendMode = 'overlay';
          if (op) op.value = 15;
          if (blend) blend.value = 'overlay';
          if (status) status.textContent = 'Vívido';
        }
      };

      window.handleUpload = window.handleUpload || function (input) {
        const file = input && input.files && input.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        if (bgLayer) bgLayer.style.backgroundImage = `url('${url}')`;
      };

      window.loadCurrentFrameToFX = window.loadCurrentFrameToFX || function () {
        const canvas = document.getElementById('fxCanvas');
        const ctx = canvas && canvas.getContext && canvas.getContext('2d');
        if (!canvas || !ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#111';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';
        ctx.font = '28px Inter, sans-serif';
        ctx.fillText('FX Lab pronto para receber frame', 40, 80);
      };

      window.downloadFX = window.downloadFX || function () {
        const canvas = document.getElementById('fxCanvas');
        if (!canvas) return;
        const link = document.createElement('a');
        link.download = 'fx-lab.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      window.setFXMode = window.setFXMode || function (mode) {
        document.querySelectorAll('[data-fx-mode]').forEach(btn => btn.classList.remove('active'));
        const active = document.querySelector(`[data-fx-mode="${mode}"]`);
        if (active) active.classList.add('active');
      };

      window.applyFXToBackground = window.applyFXToBackground || function () {
        const canvas = document.getElementById('fxCanvas');
        if (!canvas) return;
        const dataUrl = canvas.toDataURL('image/png');
        if (bgLayer) bgLayer.style.backgroundImage = `url('${dataUrl}')`;
      };

      window.changeFrame = window.changeFrame || function () {
        console.log('changeFrame fallback');
      };

      const thumbs = document.getElementById('thumb-list');
      const library = [
        { label: 'hero', src: 'https://kodux78k.github.io/oiDual--Y-/M0D/78FFD/media/hero/hero2.jpg' },
        { label: 'bg', src: 'https://kodux78k.github.io/oiDual--Y-/M0D/78FFD/media/hero/bg.jpeg' },
        { label: 'mandala', src: 'https://kodux78k.github.io/oiDual--Y-/M0D/78FFD/media/hero/mandala.png' }
      ];

      if (thumbs) {
        thumbs.innerHTML = library.map(item => `
          <button class="bg-thumb" style="background-image:url('${item.src}')" data-label="${item.label}" onclick="document.getElementById('bg-layer-fixed').style.backgroundImage='url(${item.src})'; document.getElementById('bgStatusText').textContent='${item.label}'"></button>
        `).join('');
      }

      const libCount = document.getElementById('libCount');
      if (libCount) libCount.textContent = String(library.length);

      window.addEventListener('load', function () {
        if (window.applyPreset) window.applyPreset('vivid');
        const counter = document.getElementById('ui-catalog-counter');
        if (counter) counter.textContent = 'FEELING DECOR · READY';
      });
    })();
  </script>




  <script>
    console.log("Sistema Pronto.");
  </script>
